spring:
  application:
    name: linkly-api
  datasource:
    url: jdbc:h2:file:./data/linkly;AUTO_SERVER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

server:
  port: 8080

# Linkly 애플리케이션 설정
linkly:
  # 단축 링크/QR에 쓰이는 공개 기준 주소. 배포 시 DDNS 주소로 덮어씀.
  base-url: http://localhost:8080
  # CORS 허용 오리진 (프론트 dev 서버)
  cors-allowed-origins: http://localhost:5173
