name: Build & Publish to GHCR

# main 에 push 되면 이미지를 빌드해서 GitHub Container Registry(GHCR)로 올린다.
# NAS 의 Watchtower 가 이 이미지를 감지해 자동으로 pull + 재시작한다.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # 수동 실행도 허용

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # 예: hapyCodding/linkly (metadata-action 이 소문자화)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCR push 권한 (기본 GITHUB_TOKEN 사용)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
