# CI/CD 배포용: GHCR 이미지를 쓰고 Watchtower 가 자동 업데이트한다.
# (GitHub Actions 가 main push 마다 ghcr.io/<owner>/linkly:latest 를 갱신)
#
# NAS /volume1/docker/linkly/docker-compose.yml 로 이 내용을 쓰고 .env 를 둔다.
# GHCR 패키지를 Public 으로 해두면 pull 에 인증이 필요 없다.
services:
  api:
    # ⚠️ owner 는 소문자여야 함 (GHCR 규칙). 예: ghcr.io/hapycodding/linkly:latest
    image: ghcr.io/hapycodding/linkly:latest
    container_name: linkly-api
    restart: unless-stopped
    ports:
      - "18081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: mariadb
      SPRING_DATASOURCE_URL: jdbc:mariadb://192.168.35.2:3307/linkly
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD를 .env에 설정하세요}
      LINKLY_BASE_URL: ${LINKLY_BASE_URL:-https://your-nas.synology.me:8444}
      LINKLY_CORS_ALLOWED_ORIGINS: ${LINKLY_CORS_ALLOWED_ORIGINS:-https://your-nas.synology.me:8444}
    labels:
      # Watchtower 가 이 컨테이너만 감시하도록 표시
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: linkly-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # 180초마다 확인, 새 이미지면 pull+재생성, 이전 이미지 정리, 라벨 붙은 것만 감시
    command: --interval 180 --cleanup --label-enable
